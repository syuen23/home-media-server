# Home media server stack

services:
  # gluetun: # vpn
  #   image: ...
  #   container_name: media-vpn

  # bazarr: # subtitle grabber
  #   image: ...
  #   container_name: bazarr

  prowlarr: # indexer manager for Sonarr and Radarr
    image: lscr.io/linuxserver/prowlarr:${PROWLARR_TAG}
    container_name: prowlarr
    environment:
      - PUID=${PUID:?missing PUID}
      - PGID=${PGID:?missing PGID}
      - TZ=${TZ:?missing time zone}
    volumes:
      - ${DATA_ROOT}/config/prowlarr:/config
    ports:
      - ${PROWLARR_PORT}:9696
    restart: unless-stopped

  sonarr: # tv show PVR
    image: lscr.io/linuxserver/sonarr:${SONARR_TAG}
    container_name: sonarr
    environment:
      - PUID=${PUID:?missing PUID}
      - PGID=${PGID:?missing PGID}
      - TZ=${TZ:?missing time zone}
    volumes:
      - ${DATA_ROOT}/config/sonarr:/config
      - ${DATA_ROOT}/data:/data
    ports:
      - ${SONARR_PORT}:8989
    restart: unless-stopped

  radarr: # movie pvr
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID:?missing PUID}
      - PGID=${PGID:?missing PGID}
      - TZ=${TZ:?missing time zone}
    volumes:
      - ${DATA_ROOT}/config/radarr:/config
      - ${DATA_ROOT}/data:/data
    ports:
      - ${RADARR_PORT}:7878
    restart: unless-stopped

  nzbget: # usenet download agent
    image: lscr.io/linuxserver/nzbget:${NZBGET_TAG}
    container_name: nzbget
    environment:
      - PUID=${PUID:?missing PUID}
      - PGID=${PGID:?missing PGID}
      - TZ=${TZ:?missing time zone}
      - NZBGET_USER=${NZBGET_USER} # optional
      - NZBGET_PASS=${NZBGET_PASS} # optional
    volumes:
      - ${DATA_ROOT}/config/nzbget:/config
      - ${DATA_ROOT}/data:/data
    ports:
      - ${NZBGET_PORT}:6789
    restart: unless-stopped

  seerr: # automatic content requester
    image: ghcr.io/seerr-team/seerr:${SEERR_TAG}
    init: true
    container_name: seerr
    environment:
      - LOG_LEVEL=debug
      - TZ=${TZ}
      - PORT=5055 #optional
    ports:
      - ${SEERR_PORT}:5055
    volumes:
      - seerr-data:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:${SEERR_PORT}/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped

  plex: # media server
    image: lscr.io/linuxserver/plex:${PLEX_TAG}
    container_name: plex
    devices:
      - /dev/dri:/dev/dri # iGPU passthrough
    # utilizes the host's network. might want to try to secure this some way
    network_mode: host # apparently plex prefers host networking
    environment:
      - PUID=${PUID:?missing PUID}
      - PGID=${PGID:?missing PGID}
      - TZ=${TZ:?missing Time Zone}
      - VERSION=docker # set whether or not to update plex
      - PLEX_CLAIM=${PLEX_CLAIM} # optional, from https://plex.tv/claim, expires in 4 min
    volumes:
      - ${DATA_ROOT}/config/plex:/config # plex library location
      - ${DATA_ROOT}/data:/data
    restart: unless-stopped

networks:
  default:
    name: media-server

volumes:
  seerr-data:
    external: true
