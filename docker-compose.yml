# Home media server stack

services:
  gluetun: # vpn gate
    image: ...
    container_name: media-vpn

  bazarr: # subtitle grabber
    image: lscr.io/linuxserver/bazarr:${BAZARR_TAG}
    container_name: bazarr
    environment:
      - PUID=${PUID:?missing PUID}
      - PGID=${PGID:?missing PGID}
      - TZ=${TZ:?missing time zone}
    volumes:
      - ${CONFIG_DIR}/config/bazarr:/config
      - ${DATA_ROOT}/data:/data
    ports:
      - ${BAZARR_PORT}:6767
    networks: [frontend-net]
    restart: unless-stopped

  prowlarr: # indexer manager for Sonarr and Radarr
    image: lscr.io/linuxserver/prowlarr:${PROWLARR_TAG}
    container_name: prowlarr
    environment:
      - PUID=${PUID:?missing PUID}
      - PGID=${PGID:?missing PGID}
      - TZ=${TZ:?missing time zone}
    volumes:
      - ${CONFIG_DIR}/config/prowlarr:/config
    ports:
      - ${PROWLARR_PORT}:9696
    networks: [arr-net]
    restart: unless-stopped

  sonarr: # tv show PVR
    image: lscr.io/linuxserver/sonarr:${SONARR_TAG}
    container_name: sonarr
    environment:
      - PUID=${PUID:?missing PUID}
      - PGID=${PGID:?missing PGID}
      - TZ=${TZ:?missing time zone}
    volumes:
      - ${CONFIG_DIR}/config/sonarr:/config
      - ${DATA_ROOT}/data:/data
    ports:
      - ${SONARR_PORT}:8989
    networks: [arr-net, frontend-net]
    restart: unless-stopped

  radarr: # movie pvr
    image: lscr.io/linuxserver/radarr:${RADARR_TAG}
    container_name: radarr
    environment:
      - PUID=${PUID:?missing PUID}
      - PGID=${PGID:?missing PGID}
      - TZ=${TZ:?missing time zone}
    volumes:
      - ${CONFIG_DIR}/config/radarr:/config
      - ${DATA_ROOT}/data:/data
    ports:
      - ${RADARR_PORT}:7878
    networks: [arr-net, frontend-net]
    restart: unless-stopped

  nzbget: # usenet download agent
    image: lscr.io/linuxserver/nzbget:${NZBGET_TAG}
    container_name: nzbget
    environment:
      - PUID=${PUID:?missing PUID}
      - PGID=${PGID:?missing PGID}
      - TZ=${TZ:?missing time zone}
      - NZBGET_USER=${NZBGET_USER} # optional
      - NZBGET_PASS=${NZBGET_PASS} # optional
    volumes:
      - ${CONFIG_DIR}/config/nzbget:/config
      - ${DATA_ROOT}/data:/data
    ports:
      - ${NZBGET_PORT}:6789
    networks: [arr-net]
    restart: unless-stopped

  seerr: # automatic content requester
    image: ghcr.io/seerr-team/seerr:${SEERR_TAG}
    init: true
    container_name: seerr
    environment:
      - LOG_LEVEL=debug
      - TZ=${TZ}
      - PORT=5055 # optional
    ports:
      - ${SEERR_PORT}:5055
    volumes:
      - ${CONFIG_DIR}/config/seerr:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    networks: [frontend-net]
    restart: unless-stopped

  plex: # media server
    image: lscr.io/linuxserver/plex:${PLEX_TAG}
    container_name: plex
    devices:
      - /dev/dri:/dev/dri # iGPU passthrough
    # utilizes the host's network. might want to try to secure this some way
    network_mode: host # apparently plex prefers host networking
    environment:
      - PUID=${PUID:?missing PUID}
      - PGID=${PGID:?missing PGID}
      - TZ=${TZ:?missing Time Zone}
      - VERSION=docker # set whether or not to update plex
      - PLEX_CLAIM=${PLEX_CLAIM} # optional, from https://plex.tv/claim, expires in 4 min
    volumes:
      - ${CONFIG_DIR}/config/plex:/config # plex library location
      - ${DATA_ROOT}/data:/data
    restart: unless-stopped

networks:
  arr-net:
    name: arr
  frontend-net:
    name: frontend